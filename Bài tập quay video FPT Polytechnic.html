    <style>
        /* CSS Abstract Art Styles */
        .art-box { position: relative; overflow: hidden; height: 120px; border-radius: 1rem 1rem 0 0; }
        .art-box::before, .art-box::after { content: ''; position: absolute; }
        
        /* 1. Tổng quan */
        .art-1 { background: linear-gradient(135deg, #11295A, #2563eb); }
        .art-1::before { width: 150px; height: 150px; background: #F26F21; border-radius: 50%; top: -50px; right: -50px; opacity: 0.8; }
        .art-1::after { width: 100%; height: 50px; background: rgba(255,255,255,0.1); bottom: 20px; transform: skewY(-5deg); }

        /* 2. Sống ảo */
        .art-2 { background: linear-gradient(45deg, #f472b6, #fb923c); }
        .art-2::before { width: 80px; height: 80px; border: 8px solid white; border-radius: 20px; top: 20px; left: 50%; transform: translateX(-50%); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .art-2::after { width: 20px; height: 20px; background: white; border-radius: 50%; top: 30px; left: calc(50% + 20px); }

        /* 3. Cơ sở vật chất */
        .art-3 { background: #1e293b; background-image: radial-gradient(#475569 1px, transparent 1px); background-size: 15px 15px; }
        .art-3::before { width: 100px; height: 4px; background: #10b981; top: 50px; left: 0; box-shadow: 0 0 15px #10b981; }
        .art-3::after { width: 4px; height: 100px; background: #3b82f6; top: 0; right: 50px; box-shadow: 0 0 15px #3b82f6; }

        /* 4. Livestream BĐS */
        .art-4 { background: linear-gradient(to right, #ef4444, #b91c1c); }
        .art-4::before { width: 60px; height: 60px; border: 5px solid white; border-radius: 50%; top: 30px; left: 30px; animation: pulse 2s infinite; }
        .art-4::after { content: 'LIVE'; color: white; font-weight: 800; font-size: 24px; top: 45px; right: 30px; letter-spacing: 2px; }

        /* 5. Phóng sự chuyên nghiệp */
        .art-5 { background: linear-gradient(135deg, #1e3a8a, #0f172a); }
        .art-5::before { width: 100%; height: 1px; background: rgba(255,255,255,0.2); top: 50%; left: 0; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .art-5::after { width: 60px; height: 60px; border: 2px solid #F26F21; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(242,111,33,0.5); }

        /* 6. Chuyên nghiệp - Công thức PAS */
        .art-6 { background: linear-gradient(135deg, #334155 50%, #F26F21 50%); }
        .art-6::before { width: 120px; height: 120px; border: 10px solid rgba(255,255,255,0.1); border-radius: 50%; top: -20px; left: -20px; }
        .art-6::after { width: 0; height: 0; border-top: 30px solid transparent; border-bottom: 30px solid transparent; border-left: 50px solid white; top: 30px; right: 40px; opacity: 0.9; }

        /* 7. Review Michelin */
        .art-7 { background: linear-gradient(to bottom right, #fef08a, #f59e0b); }
        .art-7::before { width: 90px; height: 90px; border: 15px solid white; border-radius: 50%; top: 15px; left: 50%; transform: translateX(-50%); opacity: 0.9; }
        .art-7::after { width: 50px; height: 50px; background: #b45309; border-radius: 50%; top: 35px; left: 50%; transform: translateX(-50%); opacity: 0.7; }

        /* 8. Flex sương sương */
        .art-8 { background: linear-gradient(45deg, #d97706, #fcd34d); }
        .art-8::before { width: 200%; height: 20px; background: rgba(255,255,255,0.4); top: 50px; left: -50%; transform: rotate(25deg); }
        .art-8::after { width: 200%; height: 10px; background: rgba(255,255,255,0.6); top: 80px; left: -50%; transform: rotate(-15deg); }

        /* 9. Bóc phốt */
        .art-9 { background: repeating-linear-gradient(45deg, #000, #000 20px, #dc2626 20px, #dc2626 40px); }
        .art-9::before { width: 80%; height: 60%; background: white; top: 20%; left: 10%; transform: skewX(-10deg); mix-blend-mode: screen; }

        /* 10. Thao túng tâm lý */
        .art-10 { background: linear-gradient(180deg, #10b981, #047857); }
        .art-10::before { width: 50px; height: 80px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: rgba(255,255,255,0.8); top: 20px; right: 40px; transform: rotate(15deg); }
        .art-10::after { width: 30px; height: 50px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: rgba(255,255,255,0.5); top: 40px; left: 50px; transform: rotate(-20deg); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        /* Smooth accordion transition */
        .script-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out, padding 0.4s ease-in-out; }
        .script-content.open { max-height: 2500px; } /* Đủ dài cho nội dung mobile */

        .step-card::before { content: ''; position: absolute; left: -7px; top: 0; width: 11px; height: 11px; background: #F26F21; border-radius: 50%; }
